<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevMate AI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- MAIN VIEW -->
  <div id="main-view" class="view active">
    <header>
      <h1>DevMate <span>AI</span></h1>
      <button id="settings-btn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </header>
    <div class="content">
      <p class="subtitle">FreeCodeCamp Assistant</p>
      <div class="action-buttons">
        <button id="solve-btn" class="btn primary">
          <span class="btn-text">Solve Challenge</span>
          <div class="spinner hidden"></div>
        </button>
        <button id="fix-btn" class="btn secondary">
          <span class="btn-text">Fix Errors</span>
          <div class="spinner hidden"></div>
        </button>
      </div>
      <div id="status-message" class="status"></div>
    </div>
  </div>

  <!-- SETTINGS VIEW -->
  <div id="settings-view" class="view">
    <header>
      <button id="back-btn" title="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      </button>
      <h1>Settings</h1>
    </header>
    <div class="content">
      <div class="form-group">
        <label for="api-key">API Key</label>
        <input type="password" id="api-key" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label for="api-url">API Endpoint URL</label>
        <input type="text" id="api-url" placeholder="https://api.openai.com/v1/chat/completions">
      </div>
      <div class="form-group">
        <label for="api-model">Model Name</label>
        <input type="text" id="api-model" placeholder="gpt-4o">
        <p class="help-text">For Groq: use url <b>https://api.groq.com/openai/v1/chat/completions</b> and model <b>llama-3.3-70b-versatile</b></p>
      </div>
      <button id="save-key-btn" class="btn primary">Save & Apply</button>
      <div id="settings-status" class="status"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
